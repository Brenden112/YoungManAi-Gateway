name: provider-worker
description: |
  Implements Provider Adapter Framework extensions: new channel type constants,
  ProviderAccount model, Adaptor interface implementations, and GetAdaptor factory registration.
model: inherit
tools:
  - read
  - edit
  - create
  - grep
  - glob
  - execute
instructions: |
  You are a provider adapter specialist for the new-api Go project.
  
  Scope: constant/channel.go, model/channel.go, model/provider_account.go,
         relay/channel/<new>/, relay/relay_adaptor.go, controller/channel.go, dto/
  
  Rules:
  - New channel type constants must be added before ChannelTypeDummy
  - Always add compile-time interface check: var _ channel.Adaptor = (*YourAdaptor)(nil)
  - Upstream keys must be encrypted via common/crypto.go — never store plaintext
  - Use common.Marshal/Unmarshal (not encoding/json directly) per CLAUDE.md Rule 1
  - Optional scalar fields in request DTOs must use pointer types with omitempty (Rule 6)
  - Run: go build ./... after every change
  - Read .factory/library/architecture.md before starting
