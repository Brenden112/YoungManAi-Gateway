# New-API Docker Compose Configuration
#
# Staging/deployment-safe default:
#   - No production-ready password, token, provider key, or encryption secret is hardcoded here.
#   - Sensitive values are read from environment variables.
#   - The fallback values below are placeholders for local syntax validation only.
#   - For staging, copy .env.staging.example to .env.staging, fill controlled secrets,
#     and run: docker compose --env-file .env.staging up -d
#
# Local fixture only:
#   Use docker-compose.fixture.yml for fake-provider regression smoke. It is not for production.
#
# Using MySQL instead of PostgreSQL:
#   1. Set SQL_DSN to a MySQL DSN in your env file.
#   2. Add or enable a MySQL service in an override file.

services:
  new-api:
    image: ${NEW_API_IMAGE:-calciumion/new-api:latest}
    container_name: new-api
    restart: always
    command: --log-dir /app/logs
    ports:
      - "${NEW_API_PORT:-3001}:3000"
    volumes:
      - ./data:/data
      - ./logs:/app/logs
    environment:
      SQL_DSN: ${SQL_DSN:-postgresql://new_api:change-me-local-only@postgres:5432/new_api}
      REDIS_CONN_STRING: ${REDIS_CONN_STRING:-redis://:change-me-local-only@redis:6379}
      SESSION_SECRET: ${SESSION_SECRET:-change-me-local-only-session-secret}
      CRYPTO_SECRET: ${CRYPTO_SECRET:-change-me-local-only-crypto-secret}
      TZ: ${TZ:-Asia/Shanghai}
      ERROR_LOG_ENABLED: ${ERROR_LOG_ENABLED:-true}
      BATCH_UPDATE_ENABLED: ${BATCH_UPDATE_ENABLED:-true}
      STORE_FULL_TEXT_ENABLED: ${STORE_FULL_TEXT_ENABLED:-false}
      NODE_NAME: ${NODE_NAME:-new-api-node-1}
      STREAMING_TIMEOUT: ${STREAMING_TIMEOUT:-300}

    depends_on:
      - redis
      - postgres
    networks:
      - new-api-network
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://localhost:3000/api/status | grep -o '\"success\":\\s*true' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  redis:
    image: redis:7-alpine
    container_name: redis
    restart: always
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD:-change-me-local-only}"]
    networks:
      - new-api-network

  postgres:
    image: postgres:15
    container_name: postgres
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-new_api}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me-local-only}
      POSTGRES_DB: ${POSTGRES_DB:-new_api}
    volumes:
      - pg_data:/var/lib/postgresql/data
    networks:
      - new-api-network
#    ports:
#      - "5432:5432"  # Uncomment if you need to access PostgreSQL from outside Docker

volumes:
  pg_data:

networks:
  new-api-network:
    driver: bridge
